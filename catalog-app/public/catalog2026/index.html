<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>גרופי 2026 - קטלוג דיגיטלי</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f1115;
            --header-bg: #1a1d23;
        }
        body { margin: 0; background: var(--bg); font-family: system-ui, -apple-system, sans-serif; overflow: hidden; color: white; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        header { 
            background: var(--header-bg); 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }
        h1 { margin: 0; font-size: 1.25rem; font-weight: 800; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        main { flex: 1; display: flex; align-items: flex-start; justify-content: center; position: relative; overflow: hidden; padding-top: 10px; }
        #book { box-shadow: 0 0 100px rgba(0,0,0,0.8); visibility: hidden; }
        .page { background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; max-height: 100%; width: 100%; height: 100%; display: block; }
        .loading { 
            display: flex; flex-direction: column; align-items: center; gap: 1rem;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn { background: none; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 0.8rem; opacity: 0.7; transition: 0.2s; }
        .btn:hover { opacity: 1; color: var(--primary); }
        #page-info { font-size: 0.9rem; color: #888; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Groopy 2026</h1>
            <div id="page-info">טוען...</div>
        </header>
        <main>
            <div class="loading" id="loader">
                <div class="spinner"></div>
                <div style="font-weight: bold; font-size: 0.9rem; color: #888;">מכין את הקטלוג הדיגיטלי...</div>
            </div>
            <div id="book"></div>
        </main>
        <div class="controls" id="controls" style="display: none;">
            <button class="btn" onclick="flipTo(0)">התחלה</button>
            <button class="btn" onclick="flipPrev()">הקודם</button>
            <button class="btn" onclick="flipNext()">הבא</button>
            <button class="btn" onclick="flipTo(lastPage)">סוף</button>
        </div>
    </div>

    <script>
        const url = 'CatalogWeb%202026.pdf';
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let pageFlip = null;
        let lastPage = 0;
        const book = document.getElementById('book');
        const loader = document.getElementById('loader');

        async function init() {
            try {
                pdfDoc = await pdfjsLib.getDocument(url).promise;
                lastPage = pdfDoc.numPages - 1;
                
                const firstPage = await pdfDoc.getPage(1);
                const viewport = firstPage.getViewport({ scale: 1 });
                const pdfAspectRatio = viewport.width / viewport.height;

                function getDimensions() {
                    const winW = window.innerWidth;
                    const winH = window.innerHeight - 100; // Adjusted for Header + Footer
                    const paddingX = 40;
                    const paddingTop = 10;
                    const paddingBottom = 30;
                    
                    let availableW = winW - (paddingX * 2);
                    let availableH = winH - (paddingTop + paddingBottom);
                    
                    let pageWidth = availableW / 2;
                    let pageHeight = pageWidth / pdfAspectRatio;
                    
                    if (pageHeight > availableH) {
                        pageHeight = availableH;
                        pageWidth = pageHeight * pdfAspectRatio;
                    }
                    
                    return { width: Math.floor(pageWidth), height: Math.floor(pageHeight) };
                }

                const dims = getDimensions();

                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    const canvas = document.createElement('canvas');
                    pageDiv.appendChild(canvas);
                    book.appendChild(pageDiv);
                    renderPage(i, canvas, dims.width);
                }

                pageFlip = new St.PageFlip(book, {
                    width: dims.width,
                    height: dims.height,
                    size: 'fixed',
                    drawShadow: true,
                    usePortrait: false,
                    showCover: false,
                    flippingTime: 800
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                book.style.visibility = 'visible';
                loader.style.display = 'none';
                document.getElementById('controls').style.display = 'flex';
                updateInfo(0);

                pageFlip.on('flip', (e) => updateInfo(e.data));

            } catch (err) {
                console.error(err);
                loader.innerHTML = '<div style="color:#f87171">שגיאה בטעינת הקטלוג</div><div style="font-size:0.8rem;margin-top:10px">' + err.message + '</div>';
            }
        }

        async function renderPage(num, canvas, width) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: 1 });
            const scale = width / viewport.width;
            const scaledViewport = page.getViewport({ scale: scale * 1.5 }); // High res render
            const context = canvas.getContext('2d');
            canvas.height = scaledViewport.height;
            canvas.width = scaledViewport.width;
            await page.render({ canvasContext: context, viewport: scaledViewport }).promise;
        }

        function updateInfo(current) {
            const total = pdfDoc.numPages;
            document.getElementById('page-info').textContent = `עמוד ${current + 1}-${Math.min(current + 2, total)} / ${total}`;
        }

        function flipNext() { pageFlip.flipNext(); }
        function flipPrev() { pageFlip.flipPrev(); }
        function flipTo(n) { pageFlip.flip(n); }

        init();
    </script>
</body>
</html>
